spring.application.name=mywallet
server.port=8080

# PostgreSQL via SSH tunnel (MacBook localhost:5433 -> Mac mini localhost:5432)
#spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/mywalletdb?sslmode=disable&gssencmode=disable
spring.datasource.url=jdbc:postgresql://localhost:5433/mywalletDB

spring.datasource.username=expense_user
spring.datasource.password=test


spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=false